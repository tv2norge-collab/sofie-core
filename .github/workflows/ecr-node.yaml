name: ECR Node CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v**"
permissions:
  contents: read

jobs:
  lint-core:
    name: Typecheck and Lint Core
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
      - uses: ./.github/actions/setup-meteor
      - name: restore node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            meteor/node_modules
            packages/node_modules
          key: ${{ runner.os }}-${{ hashFiles('yarn.lock', 'meteor/yarn.lock', 'meteor/.meteor/release', 'packages/yarn.lock') }}
      - uses: ./.github/actions/codeartifact-login
        with:
          account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Prepare Environment
        run: |
          yarn config set cacheFolder /home/runner/lint-core-cache
          yarn

          # setup zodern:types. No linters are setup, so this simply installs the packages
          yarn meteor lint

          yarn build:packages
        env:
          CI: true
      - name: Run typecheck and linter
        run: |
          cd meteor
          yarn ci:lint
        env:
          CI: true

  test-core:
    name: Test Core
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
      - uses: ./.github/actions/setup-meteor
      - name: restore node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            meteor/node_modules
            packages/node_modules
          key: ${{ runner.os }}-${{ hashFiles('yarn.lock', 'meteor/yarn.lock', 'meteor/.meteor/release', 'packages/yarn.lock') }}
      - uses: ./.github/actions/codeartifact-login
        with:
          account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Prepare Environment
        run: |
          yarn config set cacheFolder /home/runner/test-core-cache
          yarn

          # setup zodern:types. No linters are setup, so this simply installs the packages
          yarn meteor lint

          yarn build:packages
        env:
          CI: true
      - name: Run Tests
        run: |
          cd meteor
          NODE_OPTIONS="--max-old-space-size=6144" yarn unitci --force-exit
        env:
          CI: true
      - name: Send coverage
        if: ((github.event_name == 'pull_request') && (!startsWith(github.head_ref, 'release'))) || ((github.event_name == 'push') && (!startsWith(github.ref_name, 'release')))
        uses: codecov/codecov-action@v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build-core:
    name: Build Core and publish docker image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
      - uses: ./.github/actions/setup-meteor
      - name: restore node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            meteor/node_modules
            packages/node_modules
          key: ${{ runner.os }}-${{ hashFiles('yarn.lock', 'meteor/yarn.lock', 'meteor/.meteor/release', 'packages/yarn.lock') }}
      - uses: ./.github/actions/codeartifact-login
        with:
          account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Prepare Environment
        run: |
          yarn install

          # setup zodern:types. No linters are setup, so this simply installs the packages
          yarn meteor lint
      - name: Build libs
        run: |
          yarn build:packages
      - name: Build webui
        run: |
          cd packages/webui
          yarn build
      - name: Persist Built Version information
        run: |
          cd meteor
          yarn inject-git-hash
      - name: Prepare webui for meteor build
        run: |
          rm -Rf meteor/public
          cp -R packages/webui/dist meteor/public
      - name: Meteor Build
        run: |
          cd meteor
          NODE_OPTIONS="--max-old-space-size=4096" METEOR_DEBUG_BUILD=1 meteor build --allow-superuser --directory .
          mv bundle/programs/web.browser/assets/ bundle/programs/web.browser/app/assets/ || true
      - name: Meteor Bundle NPM Build
        run: |
          cd meteor/bundle/programs/server
          meteor npm install
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Get the Docker tag for ECR
        id: ecr-tag
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/sofie-core
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push to ECR
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./meteor/Dockerfile.circle
          push: true
          provenance: false
          labels: ${{ steps.ecr-tag.outputs.labels }}
          tags: "${{ steps.ecr-tag.outputs.tags }}"
          github-token: ${{ github.token }}

  build-gateways:
    name: Build gateways
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        gateway-name: [playout-gateway, mos-gateway, "live-status-gateway"]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
      - name: restore node_modules
        uses: actions/cache@v5
        with:
          path: |
            packages/node_modules
          key: ${{ runner.os }}-${{ hashFiles('packages/yarn.lock') }}
      - uses: ./.github/actions/codeartifact-login
        with:
          account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Build
        run: |
          cd packages
          yarn install
          yarn build:single ${{ matrix.gateway-name }}/tsconfig.build.json
          yarn run pinst --disable
          yarn workspaces focus ${{ matrix.gateway-name }} --production
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Get the Docker tag for ECR
        id: ecr-tag
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ matrix.gateway-name }}
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push to ECR
        uses: docker/build-push-action@v7
        with:
          context: ./packages
          file: ./packages/${{ matrix.gateway-name }}/Dockerfile.circle
          push: true
          provenance: false
          labels: ${{ steps.ecr-tag.outputs.labels }}
          tags: "${{ steps.ecr-tag.outputs.tags }}"

  lint-packages:
    name: Lint Packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
      - uses: ./.github/actions/setup-meteor
      - name: restore node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            meteor/node_modules
            packages/node_modules
          key: ${{ runner.os }}-${{ hashFiles('yarn.lock', 'meteor/yarn.lock', 'meteor/.meteor/release', 'packages/yarn.lock') }}
      - uses: ./.github/actions/codeartifact-login
        with:
          account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Prepare Environment
        run: |
          yarn config set cacheFolder /home/runner/publish-docs-cache
          yarn install

          # setup zodern:types. No linters are setup, so this simply installs the packages
          yarn meteor lint

          cd packages
          yarn build:all
        env:
          CI: true
      - name: Run typecheck and linter
        run: |
          cd packages
          yarn lint
        env:
          CI: true

  test-packages:
    name: Test Package ${{ matrix.package-name }} (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        package-name:
          - blueprints-integration
          - server-core-integration
          - shared-lib
          # - live-status-gateway-api # no tests yet
          - openapi
        node-version: [22.x]
        include:
          - node-version: 22.x
            package-name: corelib
            send-coverage: true
          - node-version: 22.x
            package-name: job-worker
            send-coverage: true
          # No tests for some gateways yet
          # - node-version: 22.x
          #   package-name: playout-gateway
          #   send-coverage: true
          - node-version: 22.x
            package-name: mos-gateway
            send-coverage: true
          - node-version: 22.x
            package-name: live-status-gateway
            send-coverage: true
          - node-version: 22.x
            package-name: webui
            send-coverage: true
            tsconfig-name: tsconfig.json
          - node-version: 22.x
            package-name: meteor-lib
            send-coverage: true
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: restore node_modules
        uses: actions/cache@v5
        with:
          path: |
            packages/node_modules
          key: ${{ runner.os }}-${{ hashFiles('packages/yarn.lock') }}
      - uses: ./.github/actions/codeartifact-login
        with:
          account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Prepare Environment
        run: |
          cd packages
          yarn config set cacheFolder /home/runner/test-packages-cache
          yarn install

          if [ "${{ matrix.package-name }}" = "openapi" ]; then
            yarn workspace @sofie-automation/openapi run build
          else
            yarn build:single ${{ matrix.package-name }}/${{ matrix.tsconfig-name || 'tsconfig.build.json' }}
          fi
        env:
          CI: true
      - name: Run tests
        run: |
          cd packages/${{ matrix.package-name }}
          yarn unit
        env:
          CI: true
      - name: Send coverage
        if: (matrix.node-version == '22.x' || matrix.send-coverage == true) && (((github.event_name == 'pull_request') && (!startsWith(github.head_ref, 'release'))) || ((github.event_name == 'push') && (!startsWith(github.ref_name, 'release'))))
        uses: codecov/codecov-action@v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  asyncapi-generation:
    name: AsyncAPI Generation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
      - uses: ./.github/actions/codeartifact-login
        with:
          account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Prepare Environment
        run: |
          cd packages
          yarn
        env:
          CI: true
      - name: Run generator
        run: |
          cd packages/live-status-gateway-api

          yarn gendocs
          yarn genserver

          yarn generate-schema-types
        env:
          CI: true

  openapi-generation:
    name: OpenAPI Generation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
      - uses: ./.github/actions/codeartifact-login
        with:
          account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Prepare Environment
        run: |
          cd packages
          yarn
        env:
          CI: true
      - name: Build OpenAPI client library
        run: |
          cd packages/openapi
          yarn build
        env:
          CI: true
      - name: Generate OpenAPI docs and server
        run: |
          cd packages/openapi
          yarn gendocs
          yarn genserver
        env:
          CI: true

  check-for-multiple-library-versions:
    name: Check for multiple library versions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
      - uses: ./.github/actions/setup-meteor
      - name: restore node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            meteor/node_modules
            packages/node_modules
          key: ${{ runner.os }}-${{ hashFiles('yarn.lock', 'meteor/yarn.lock', 'meteor/.meteor/release', 'packages/yarn.lock') }}
      - uses: ./.github/actions/codeartifact-login
        with:
          account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Prepare Environment
        run: |
          yarn config set cacheFolder /home/runner/check-for-multiple-library-versions-cache
          yarn
        env:
          CI: true
      - name: Run check
        run: |
          yarn validate:versions
        env:
          CI: true
